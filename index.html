                              <EditorField label="【現在の成功・実績】" name="free_profile_current" value={structure.free_profile_current} onChange={handleChange(setStructure)} rows={2} />
                            </div>

                            <EditorField label="6. CTA（今買うべき理由）" name="free_cta" value={structure.free_cta} onChange={handleChange(setStructure)} rows={2} />
                          </div>
                        </div>
                        <div className="bg-white dark:bg-slate-800 p-6 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm border-t-4 border-t-blue-500">
                          <h3 className="font-bold text-lg mb-4 text-blue-700 dark:text-blue-400">有料パート（商品）</h3>
                          <div className="space-y-4">
                            <EditorField label="1. 導入" name="paid_intro" value={structure.paid_intro} onChange={handleChange(setStructure)} rows={2} />
                            <EditorField label="2. 本編" name="paid_main" value={structure.paid_main} onChange={handleChange(setStructure)} rows={6} />
                            <EditorField label="3. つまずくポイント先回り" name="paid_pitfall" value={structure.paid_pitfall} onChange={handleChange(setStructure)} rows={3} />
                            <EditorField label="4. アクションプラン" name="paid_action" value={structure.paid_action} onChange={handleChange(setStructure)} rows={3} />
                            <EditorField label="5. 特典・サポート案内" name="paid_bonus" value={structure.paid_bonus} onChange={handleChange(setStructure)} rows={2} />
                          </div>
                        </div>
                      </div>
                      <NextButton onClick={() => { showNotification('保存しました', 'success'); setActiveTab('monetization'); }} />
                    </div>
                  )}

                  {activeTab === 'monetization' && (
                    <div className="space-y-6 animate-in">
                      <h2 className="text-2xl font-bold mb-2">価格設定 ＆ 副産物設計</h2>
                      <div className="bg-white dark:bg-slate-800 p-6 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm">
                        <h3 className="font-bold text-lg mb-4 text-indigo-700 dark:text-indigo-400 border-b border-slate-200 dark:border-slate-700 pb-2">note記事の価格設定（ロードマップ）</h3>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                          <div>
                            <label className="block text-sm font-bold mb-1 text-slate-700 dark:text-slate-300">初期リリース価格</label>
                            <div className="flex items-center gap-2">
                              <input type="number" name="initialPrice" value={concept.initialPrice} onChange={handleChange(setConcept)} className="w-full p-2 border border-slate-300 dark:border-slate-600 rounded bg-transparent text-right font-bold focus:ring-2 focus:ring-blue-500 outline-none" />
                              <span className="font-bold">円</span>
                            </div>
                          </div>
                          <div>
                            <label className="block text-sm font-bold mb-1 text-slate-700 dark:text-slate-300">最終目標価格</label>
                            <div className="flex items-center gap-2">
                              <input type="number" name="targetPrice" value={concept.targetPrice} onChange={handleChange(setConcept)} className="w-full p-2 border border-slate-300 dark:border-slate-600 rounded bg-transparent text-right font-bold text-indigo-600 dark:text-indigo-400 focus:ring-2 focus:ring-blue-500 outline-none" />
                              <span className="font-bold">円</span>
                            </div>
                          </div>
                          <div className="md:col-span-2">
                            <EditorField label="値上げの条件（メモ）" name="priceCondition" value={concept.priceCondition} onChange={handleChange(setConcept)} rows={2} />
                          </div>
                          <div>
                            <label className="block text-sm font-bold mb-1 text-slate-700 dark:text-slate-300">目標月間販売数（目標価格達成時）</label>
                            <div className="flex items-center gap-2">
                              <input type="number" name="salesTarget" value={concept.salesTarget} onChange={handleChange(setConcept)} className="w-full p-2 border border-slate-300 dark:border-slate-600 rounded bg-transparent text-right font-bold focus:ring-2 focus:ring-blue-500 outline-none" />
                              <span className="font-bold">部</span>
                            </div>
                          </div>
                        </div>
                      </div>

                      <div className="bg-white dark:bg-slate-800 p-6 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm mt-6">
                        <div className="flex justify-between items-center mb-4">
                          <h3 className="font-bold text-lg">副産物（紹介・提携・代理店報酬）</h3>
                          <button onClick={addProduct} className="flex items-center gap-1 text-sm text-blue-600 dark:text-blue-400 font-bold"><PlusCircle className="w-4 h-4" /> 追加</button>
                        </div>
                        <div className="space-y-3">
                          {products.map((product, index) => (
                            <div key={product.id} className="flex flex-wrap gap-2 items-center bg-slate-50 dark:bg-slate-700/50 p-3 rounded-lg border border-slate-200 dark:border-slate-600">
                              <input type="text" placeholder="サービス名" className="flex-1 p-2 text-sm border border-slate-300 dark:border-slate-600 rounded bg-white dark:bg-slate-700" value={product.name} onChange={(e) => { const newProducts = [...products]; newProducts[index].name = e.target.value; setProducts(newProducts); }} />
                              <input type="number" placeholder="単価" className="w-24 p-2 text-sm border border-slate-300 dark:border-slate-600 rounded bg-white dark:bg-slate-700 text-right" value={product.reward} onChange={(e) => { const newProducts = [...products]; newProducts[index].reward = Number(e.target.value); setProducts(newProducts); }} />
                              <span className="text-sm">円/件</span>
                              <button onClick={() => removeProduct(product.id)} className="p-2 text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-900/30 rounded ml-auto"><Trash2 className="w-4 h-4" /></button>
                            </div>
                          ))}
                        </div>
                        <div className="mt-6 bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-200 dark:border-emerald-800 p-4 rounded-lg">
                          <p className="font-bold text-emerald-800 dark:text-emerald-400 mb-2">最終目標達成時の推定月間収益</p>
                          <div className="text-3xl font-bold text-emerald-600 dark:text-emerald-400">
                            {((concept.targetPrice * concept.salesTarget) + (concept.salesTarget * 0.3 * products.reduce((sum, p) => sum + Number(p.reward || 0), 0))).toLocaleString()} <span className="text-lg">円</span>
                          </div>
                        </div>
                      </div>
                      <NextButton onClick={() => { showNotification('保存しました', 'success'); setActiveTab('routing'); }} />
                    </div>
                  )}

                  {activeTab === 'routing' && (
                    <div className="space-y-6 animate-in">
                      <h2 className="text-2xl font-bold mb-2">導線設計チェックリスト</h2>
                      
                      <div className="bg-white dark:bg-slate-800 p-6 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm mb-6">
                        <h3 className="font-bold text-lg mb-4 text-indigo-700 dark:text-indigo-400 border-b border-slate-200 dark:border-slate-700 pb-2 flex items-center gap-2">
                          <LinkIcon className="w-5 h-5" /> サポート窓口 ＆ ツールURL設定
                        </h3>
                        <p className="text-sm text-slate-500 dark:text-slate-400 mb-4">ここで設定したURLが、自動的にnoteの下書きや代理店マニュアルに挿入されます。</p>
                        <div className="space-y-4">
                          <EditorField label="公式LINE URL（リスト取り・サポート用）" name="lineUrl" value={concept.lineUrl} onChange={handleChange(setConcept)} placeholder="https://lin.ee/..." />
                          <EditorField label="みっけカタログサイト URL（代理店の営業武器）" name="catalogUrl" value={concept.catalogUrl} onChange={handleChange(setConcept)} placeholder="https://..." />
                        </div>
                      </div>

                      <div className="bg-white dark:bg-slate-800 p-6 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm">
                        <h3 className="font-bold text-lg mb-4">購入までの導線</h3>
                        <div className="space-y-3">
                          <CheckItem checked={checklist.profile} onChange={() => toggleCheck('profile')} label="プロフィール文に実績・ターゲットが入っている" />
                          <CheckItem checked={checklist.freePartCTA} onChange={() => toggleCheck('freePartCTA')} label="SNSの固定ツイート等にnoteへのリンクがある" />
                          <CheckItem checked={checklist.actionPlan} onChange={() => toggleCheck('actionPlan')} label="有料記事の最後に読者に行動させるアクションプランがある" />
                          <CheckItem checked={checklist.setupLine} onChange={() => toggleCheck('setupLine')} label="公式LINEを設置し、購入後のサポート体制（リスト取り）ができている" />
                        </div>
                      </div>
                      <div className="flex justify-end mt-6">
                        <button 
                          onClick={() => { showNotification('設計完了！noteの下書きを生成します', 'success'); setActiveTab('export'); }}
                          className="bg-blue-600 text-white px-8 py-3 rounded-lg font-bold flex items-center gap-2 hover:bg-blue-700 transition shadow-md"
                        >
                          <FileText className="w-5 h-5" /> note下書き出力へ進む
                        </button>
                      </div>
                    </div>
                  )}

                  {activeTab === 'export' && (
                    <div className="space-y-6 animate-in">
                      <div className="flex justify-between items-end mb-4">
                        <div>
                          <h2 className="text-2xl font-bold mb-2">note下書き出力</h2>
                          <p className="text-slate-500 dark:text-slate-400">これまでの設計データを統合しました。コピーしてnoteの執筆画面に貼り付けてください。</p>
                        </div>
                        <button 
                          onClick={() => handleCopy(exportTextRef, 'note下書きをコピーしました！')}
                          className="bg-slate-800 dark:bg-slate-700 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2 hover:bg-slate-700 dark:hover:bg-slate-600 transition shadow-md"
                        >
                          <Copy className="w-4 h-4" /> 全文をコピー
                        </button>
                      </div>

                      <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden">
                        <textarea 
                          ref={exportTextRef}
                          readOnly
                          value={generateExportText()}
                          className="w-full h-[500px] p-6 bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-mono text-sm outline-none resize-none"
                        />
                      </div>
                      
                      <div className="flex justify-end mt-6">
                        <button 
                          onClick={() => { showNotification('次は代理店マニュアルを作成します', 'success'); setActiveTab('manual'); }}
                          className="bg-indigo-600 text-white px-8 py-3 rounded-lg font-bold flex items-center gap-2 hover:bg-indigo-700 transition shadow-md"
                        >
                          <BookType className="w-5 h-5" /> 特典マニュアル作成に進む
                        </button>
                      </div>
                    </div>
                  )}

                  {activeTab === 'manual' && (
                    <div className="space-y-6 animate-in">
                      <div className="flex justify-between items-end mb-4">
                        <div>
                          <h2 className="text-2xl font-bold mb-2">特典マニュアル作成 (Word用)</h2>
                          <p className="text-slate-500 dark:text-slate-400">note本編の「目次」と完全にリンクした構成で、代理店に渡せる実践マニュアルを作成します。</p>
                        </div>
                        <button 
                          onClick={() => handleCopy(manualTextRef, 'マニュアルをコピーしました！WordやGoogleドキュメントに貼り付けてください')}
                          className="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2 hover:bg-indigo-700 transition shadow-md"
                        >
                          <Copy className="w-4 h-4" /> Word用にコピー
                        </button>
                      </div>

                      <div className="bg-slate-200 dark:bg-slate-950 p-4 md:p-8 rounded-xl flex justify-center overflow-x-auto shadow-inner">
                        <div className="bg-white w-full max-w-[210mm] min-h-[297mm] shadow-lg rounded-sm p-8 md:p-12 transition-colors">
                          <input 
                            type="text" 
                            name="title"
                            value={manual.title || `【完全版】${project.name || '〇〇'} 代理店営業マニュアル`}
                            onChange={handleChange(setManual)}
                            placeholder="マニュアルのタイトルを入力"
                            className="w-full text-2xl md:text-3xl font-bold text-center mb-8 border-b border-transparent hover:border-slate-300 focus:border-blue-500 outline-none text-slate-800 bg-transparent transition-colors"
                          />
                          <textarea
                            ref={manualTextRef}
                            name="content"
                            value={initializeManual()}
                            onChange={(e) => setManual({...manual, content: e.target.value})}
                            placeholder="ここにマニュアルの本文、提案スクリプト、ターゲットなどを記述します。"
                            className="w-full h-[850px] text-base leading-relaxed text-slate-800 outline-none resize-none bg-transparent"
                          />
                        </div>
                      </div>

                      <div className="flex justify-end mt-6">
                        <button 
                          onClick={() => { showNotification('最後に共創パートナー契約書を作成します', 'success'); setActiveTab('contract'); }}
                          className="bg-amber-600 text-white px-8 py-3 rounded-lg font-bold flex items-center gap-2 hover:bg-amber-700 transition shadow-md"
                        >
                          <Handshake className="w-5 h-5" /> 共創パートナー契約書へ進む
                        </button>
                      </div>
                    </div>
                  )}

                  {activeTab === 'contract' && (
                    <div className="space-y-6 animate-in">
                      <div className="flex justify-between items-end mb-4">
                        <div>
                          <h2 className="text-2xl font-bold mb-2">共創パートナー契約書 (自動生成)</h2>
                        </div>
                        <button 
                          onClick={() => handleCopy(contractTextRef, '契約書をコピーしました！')}
                          className="bg-amber-600 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2 hover:bg-amber-700 transition shadow-md"
                        >
                          <Copy className="w-4 h-4" /> Word用にコピー
                        </button>
                      </div>

                      <div className="bg-slate-200 dark:bg-slate-950 p-4 md:p-8 rounded-xl flex justify-center overflow-x-auto shadow-inner">
                        <div className="bg-white w-full max-w-[210mm] min-h-[297mm] shadow-lg rounded-sm p-8 md:p-12 transition-colors">
                          <input 
                            type="text" 
                            name="title"
                            value={contract.title || '共創パートナー基本契約書'}
                            onChange={handleChange(setContract)}
                            className="w-full text-2xl font-bold text-center mb-8 border-b border-transparent hover:border-slate-300 focus:border-blue-500 outline-none text-slate-800 bg-transparent transition-colors"
                          />
                          <textarea
                            ref={contractTextRef}
                            name="content"
                            value={initializeContract()}
                            onChange={(e) => setContract({...contract, content: e.target.value})}
                            className="w-full h-[800px] text-sm leading-relaxed text-slate-800 outline-none resize-none bg-transparent"
                          />
                        </div>
                      </div>
                    </div>
                  )}

                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // サブコンポーネント群
    // ==========================================
    function SidebarItem({ icon, label, active, onClick, isHighlight }) {
      return (
        <button
          onClick={onClick}
          className={`flex items-center gap-3 w-full p-3 rounded-lg text-sm font-bold transition-colors ${
            active 
              ? (isHighlight ? 'bg-amber-600 text-white shadow-md' : 'bg-blue-600 text-white shadow-md')
              : (isHighlight ? 'text-amber-600 dark:text-amber-400 hover:bg-amber-50 dark:hover:bg-amber-900/20' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700')
          }`}
        >
          {icon}
          {label}
        </button>
      );
    }

    function EditorField({ label, name, value, onChange, placeholder, rows = 1 }) {
      return (
        <div>
          <label className="block text-sm font-bold mb-1 text-slate-700 dark:text-slate-300">{label}</label>
          {rows === 1 ? (
            <input type="text" name={name} value={value} onChange={onChange} placeholder={placeholder} 
              className="w-full p-2 border border-slate-300 dark:border-slate-600 rounded bg-white dark:bg-slate-700 text-slate-800 dark:text-white placeholder-slate-400 focus:ring-2 focus:ring-blue-500 outline-none" />
          ) : (
            <textarea name={name} value={value} onChange={onChange} placeholder={placeholder} rows={rows} 
              className="w-full p-2 border border-slate-300 dark:border-slate-600 rounded bg-white dark:bg-slate-700 text-slate-800 dark:text-white placeholder-slate-400 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
          )}
        </div>
      );
    }

    function CheckItem({ checked, onChange, label }) {
      return (
        <label className="flex items-start gap-3 cursor-pointer group">
          <div className={`mt-0.5 rounded-full flex-shrink-0 transition-colors ${checked ? 'text-blue-600' : 'text-slate-300'}`}><CheckCircle2 className="w-5 h-5" /></div>
          <input type="checkbox" className="hidden" checked={checked} onChange={onChange} />
          <span className={`text-sm ${checked ? 'text-slate-500 line-through' : 'text-slate-700 dark:text-slate-200'}`}>{label}</span>
        </label>
      );
    }

    function NextButton({ onClick }) {
      return (
        <div className="flex justify-end mt-6">
          <button onClick={onClick} className="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold flex items-center gap-2 hover:bg-blue-700 transition shadow-md">
            保存して次へ <ArrowRight className="w-4 h-4" />
          </button>
        </div>
      );
    }

    // ==========================================
    // アプリケーションのレンダリング
    // ==========================================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
