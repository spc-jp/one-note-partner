    const Handshake = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m11 17 2 2a1 1 0 1 0 3-3"/><path d="m14 14 2.5 2.5a1 1 0 1 0 3-3l-3.88-3.88a3 3 0 0 0-4.24 0l-.88.88a1 1 0 1 1-3-3l2.81-2.81a5.79 5.79 0 0 1 7.06-.87l.47.28a2 2 0 0 0 1.42.25L21 4"/><path d="m21 3-6 6"/><path d="m21 16-1.85 1.85a1.5 1.5 0 0 1-2.12 0l-2.83-2.83a1.5 1.5 0 0 1 0-2.12L16 11"/><path d="m3 3 6 6"/><path d="m3 21 1.85-1.85a1.5 1.5 0 0 1 2.12 0l2.83 2.83a1.5 1.5 0 0 1 0 2.12L8 21"/></svg>;
    const LinkIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>;
    const Settings = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;
    const Sparkles = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M7 5H3"/><path d="M21 17v4"/><path d="M23 19h-4"/></svg>;
    const Loader2 = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" x2="12" y1="2" y2="6"/><line x1="12" x2="12" y1="18" y2="22"/><line x1="4.93" x2="7.76" y1="4.93" y2="7.76"/><line x1="16.24" x2="19.07" y1="16.24" y2="19.07"/><line x1="2" x2="6" y1="12" y2="12"/><line x1="18" x2="22" y1="12" y2="12"/><line x1="4.93" x2="7.76" y1="19.07" y2="16.24"/><line x1="16.24" x2="19.07" y1="7.76" y2="4.93"/></svg>;

    // ==========================================
    // データ初期値
    // ==========================================
    const BLANK_DATA = {
      project: { name: '', url: '', description: '', target: '' },
      concept: { target: '', pain: '', before: '', after: '', initialPrice: 4980, targetPrice: 29800, priceCondition: '', salesTarget: 5, lineUrl: '', catalogUrl: '' },
      structure: { free_title: '', free_intro: '', free_pain: '', free_solution: '', free_profile_past: '', free_profile_encounter: '', free_profile_current: '', free_cta: '', paid_intro: '', paid_main: '', paid_pitfall: '', paid_action: '', paid_bonus: '' },
      products: [],
      checklist: { profile: false, header: false, snsLink: false, freePartCTA: false, actionPlan: false, setupLine: false },
      manual: { title: '', content: '' },
      contract: { title: '', content: '' }
    };

    // ==========================================
    // Gemini API 呼び出し処理
    // ==========================================
    const apiKey = ""; // 実行環境から提供されます

    const fetchWithRetry = async (url, options, maxRetries = 5) => {
      let retries = 0;
      const delays = [1000, 2000, 4000, 8000, 16000];
      while (retries < maxRetries) {
        try {
          const response = await fetch(url, options);
          if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error?.message || `HTTP error! status: ${response.status}`);
          }
          return await response.json();
        } catch (error) {
          if (retries === maxRetries - 1) throw error;
          await new Promise(resolve => setTimeout(resolve, delays[retries]));
          retries++;
        }
      }
    };

    const JSON_SCHEMA = {
      type: "OBJECT",
      properties: {
        concept: {
          type: "OBJECT",
          properties: {
            target: { type: "STRING" },
            pain: { type: "STRING" },
            before: { type: "STRING" },
            after: { type: "STRING" },
            initialPrice: { type: "NUMBER" },
            targetPrice: { type: "NUMBER" },
            priceCondition: { type: "STRING" },
            salesTarget: { type: "NUMBER" }
          }
        },
        structure: {
          type: "OBJECT",
          properties: {
            free_title: { type: "STRING" },
            free_intro: { type: "STRING" },
            free_pain: { type: "STRING" },
            free_solution: { type: "STRING" },
            free_profile_past: { type: "STRING" },
            free_profile_encounter: { type: "STRING" },
            free_profile_current: { type: "STRING" },
            free_cta: { type: "STRING" },
            paid_intro: { type: "STRING" },
            paid_main: { type: "STRING" },
            paid_pitfall: { type: "STRING" },
            paid_action: { type: "STRING" },
            paid_bonus: { type: "STRING" }
          }
        },
        products: {
          type: "ARRAY",
          items: {
            type: "OBJECT",
            properties: {
              name: { type: "STRING" },
              type: { type: "STRING" },
              reward: { type: "NUMBER" }
            }
          }
        },
        manual: {
          type: "OBJECT",
          properties: {
            title: { type: "STRING" },
            content: { type: "STRING", description: "マニュアルの本文。見出しや手順を箇条書きで分かりやすく記述すること。" }
          }
        },
        contract: {
          type: "OBJECT",
          properties: {
            title: { type: "STRING" },
            content: { type: "STRING", description: "共創パートナー契約書の本文。" }
          }
        }
      }
    };

    // ==========================================
    // メインアプリケーション
    // ==========================================
    function App() {
      const [activeTab, setActiveTab] = useState('project');
      const [theme, setTheme] = useState('light');
      const [notification, setNotification] = useState({ show: false, message: '', type: '' });
      const [isLoading, setIsLoading] = useState(false);
      
      const [project, setProject] = useState(BLANK_DATA.project);
      const [concept, setConcept] = useState(BLANK_DATA.concept);
      const [structure, setStructure] = useState(BLANK_DATA.structure);
      const [products, setProducts] = useState(BLANK_DATA.products);
      const [checklist, setChecklist] = useState(BLANK_DATA.checklist);
      const [manual, setManual] = useState(BLANK_DATA.manual);
      const [contract, setContract] = useState(BLANK_DATA.contract);

      const exportTextRef = useRef(null);
      const manualTextRef = useRef(null);
      const contractTextRef = useRef(null);

      const showNotification = (message, type) => {
        setNotification({ show: true, message, type });
        setTimeout(() => setNotification({ show: false, message: '', type: '' }), 3000);
      };

      const clearData = () => {
        setProject(BLANK_DATA.project);
        setConcept(BLANK_DATA.concept);
        setStructure(BLANK_DATA.structure);
        setProducts(BLANK_DATA.products);
        setChecklist(BLANK_DATA.checklist);
        setManual(BLANK_DATA.manual);
        setContract(BLANK_DATA.contract);
        showNotification('データをクリアしました', 'info');
        setActiveTab('project');
      };

      const toggleTheme = () => {
        const newTheme = theme === 'light' ? 'dark' : 'light';
        setTheme(newTheme);
      };

      const handleChange = (setter) => (e) => {
        setter(prev => ({ ...prev, [e.target.name]: e.target.value }));
      };

      const toggleCheck = (key) => {
        setChecklist({ ...checklist, [key]: !checklist[key] });
      };

      const addProduct = () => {
        setProducts([...products, { id: Date.now(), name: '', type: '直接提携', reward: 0 }]);
      };

      const removeProduct = (id) => {
        setProducts(products.filter(p => p.id !== id));
      };

      const handleCopy = (ref, successMsg) => {
        if (ref.current) {
          ref.current.select();
          try {
            document.execCommand('copy');
            showNotification(successMsg, 'success');
          } catch (err) {
            showNotification('コピーに失敗しました。', 'error');
          }
        }
      };

      // AI自動生成メソッド
      const generateWithAI = async () => {
        if (!project.name || !project.target) {
          showNotification('「アプリ名」と「ターゲット層」を入力してください。', 'error');
          return;
        }

        setIsLoading(true);
        try {
          const prompt = `あなたは「1記事ノート戦略」のプロフェッショナルなコンサルタントです。
以下の商材（アプリ）情報を基に、代理店（共創パートナー）を集めるための売れるnote記事構成、価格設計、副産物（代理店が現場で売るバックエンド商品）、営業マニュアル、契約書を全自動で設計してください。

【商材情報】
・アプリ名：${project.name}
・URL：${project.url || '未定'}
・概要：${project.description || '未定'}
・ターゲット：${project.target}

【指示】
1. ターゲットの痛烈な悩み（Before）と、導入後の成功体験（After）を明確にすること。
2. noteの無料パートは、機能ではなく「読者の悩み解決と未来」を語る強力なセールスレター構成にすること。
3. 代理店が現場で販売した際に発生する「副産物（継続報酬や導入サポート等）」を1〜2つ考案すること。
4. 代理店が現場で使う「実践マニュアル」は、箇条書きやステップ形式を用いてすぐに使える実践的な内容にすること。
5. 「共創パートナー契約書」は、汎用的で法的に問題ないひな形を作成すること。
必ず指定されたJSONスキーマに従って出力してください。`;

          const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }],
              generationConfig: {
                responseMimeType: "application/json",
                responseSchema: JSON_SCHEMA
              }
            })
          });

          const generatedText = response.candidates[0].content.parts[0].text;
          const data = JSON.parse(generatedText);

          // Stateの更新（既存のURL設定などは残す）
          setConcept(prev => ({ 
            ...data.concept, 
            lineUrl: prev.lineUrl, 
            catalogUrl: project.url || prev.catalogUrl 
          }));
          setStructure(data.structure);
          // 製品の配列にidを付与
          setProducts(data.products ? data.products.map((p, i) => ({ ...p, id: Date.now() + i })) : []);
          setManual(data.manual);
          setContract(data.contract);
          setChecklist({ profile: true, header: true, snsLink: true, freePartCTA: true, actionPlan: true, setupLine: true });

          showNotification('AIによる全自動設計が完了しました！', 'success');
          setActiveTab('concept'); // 完了後に変化設計タブへ移動

        } catch (error) {
          console.error(error);
          showNotification('AIの生成に失敗しました。少し待って再実行してください。', 'error');
        } finally {
          setIsLoading(false);
        }
      };

      const generateExportText = () => {
        return `# ${structure.free_title || `【完全版】${project.name || '〇〇'} 代理店マニュアル`}

${structure.free_intro || '（冒頭文未入力）'}

## こんなお悩みありませんか？
${structure.free_pain || '（悩みへの共感未入力）'}
現状：${concept.before || '（Before未入力）'}

## 本記事を読むとこう変わります
${structure.free_solution || '（解決策未入力）'}
理想：${concept.after || '（After未入力）'}

## なぜ私がこれを語るのか（実績とストーリー）
【過去の失敗・絶望】\n${structure.free_profile_past || '（未入力）'}
【転機・気づき】\n${structure.free_profile_encounter || '（未入力）'}
【現在の成功・実績】\n${structure.free_profile_current || '（未入力）'}

## 今すぐ読むべき理由
${structure.free_cta || '（CTA未入力）'}

---
※ここから有料パート（現在の価格：${concept.initialPrice}円 ➡ 最終目標価格：${concept.targetPrice}円）
---

# 【実践編】マニュアル本編
${structure.paid_intro || '（導入未入力）'}

## 本編マニュアル

                        <h3 className="font-bold text-lg mb-4">購入までの導線</h3>
                        <div className="space-y-3">
                          <CheckItem checked={checklist.profile} onChange={() => toggleCheck('profile')} label="プロフィール文に実績・ターゲットが入っている" />
                          <CheckItem checked={checklist.freePartCTA} onChange={() => toggleCheck('freePartCTA')} label="SNSの固定ツイート等にnoteへのリンクがある" />
                          <CheckItem checked={checklist.actionPlan} onChange={() => toggleCheck('actionPlan')} label="有料記事の最後に読者に行動させるアクションプランがある" />
                          <CheckItem checked={checklist.setupLine} onChange={() => toggleCheck('setupLine')} label="公式LINEを設置し、購入後のサポート体制（リスト取り）ができている" />
                        </div>
                      </div>
                      <div className="flex justify-end mt-6">
                        <button 
                          onClick={() => { showNotification('設計完了！noteの下書きを生成します', 'success'); setActiveTab('export'); }}
                          className="bg-blue-600 text-white px-8 py-3 rounded-lg font-bold flex items-center gap-2 hover:bg-blue-700 transition shadow-md"
                        >
                          <FileText className="w-5 h-5" /> note下書き出力へ進む
                        </button>
                      </div>
                    </div>
                  )}

                  {activeTab === 'export' && (
                    <div className="space-y-6 animate-in">
                      <div className="flex justify-between items-end mb-4">
                        <div>
                          <h2 className="text-2xl font-bold mb-2">note下書き出力</h2>
                          <p className="text-slate-500 dark:text-slate-400">これまでの設計データを統合しました。コピーしてnoteの執筆画面に貼り付けてください。</p>
                        </div>
                        <button 
                          onClick={() => handleCopy(exportTextRef, 'note下書きをコピーしました！')}
                          className="bg-slate-800 dark:bg-slate-700 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2 hover:bg-slate-700 dark:hover:bg-slate-600 transition shadow-md"
                        >
                          <Copy className="w-4 h-4" /> 全文をコピー
                        </button>
                      </div>

                      <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden">
                        <textarea 
                          ref={exportTextRef}
                          readOnly
                          value={generateExportText()}
                          className="w-full h-[500px] p-6 bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-mono text-sm outline-none resize-none"
                        />
                      </div>
                      
                      <div className="flex justify-end mt-6">
                        <button 
                          onClick={() => { showNotification('次は代理店マニュアルを作成します', 'success'); setActiveTab('manual'); }}
                          className="bg-indigo-600 text-white px-8 py-3 rounded-lg font-bold flex items-center gap-2 hover:bg-indigo-700 transition shadow-md"
                        >
                          <BookType className="w-5 h-5" /> 特典マニュアル作成に進む
                        </button>
                      </div>
                    </div>
                  )}

                  {activeTab === 'manual' && (
                    <div className="space-y-6 animate-in">
                      <div className="flex justify-between items-end mb-4">
                        <div>
                          <h2 className="text-2xl font-bold mb-2">特典マニュアル作成 (Word用)</h2>
                          <p className="text-slate-500 dark:text-slate-400">note本編の「目次」と完全にリンクした構成で、代理店に渡せる実践マニュアルを作成します。</p>
                        </div>
                        <button 
                          onClick={() => handleCopy(manualTextRef, 'マニュアルをコピーしました！WordやGoogleドキュメントに貼り付けてください')}
                          className="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2 hover:bg-indigo-700 transition shadow-md"
                        >
                          <Copy className="w-4 h-4" /> Word用にコピー
                        </button>
                      </div>

                      <div className="bg-slate-200 dark:bg-slate-950 p-4 md:p-8 rounded-xl flex justify-center overflow-x-auto shadow-inner">
                        <div className="bg-white w-full max-w-[210mm] min-h-[297mm] shadow-lg rounded-sm p-8 md:p-12 transition-colors">
                          <input 
                            type="text" 
                            name="title"
                            value={manual.title || `【完全版】${project.name || '〇〇'} 代理店営業マニュアル`}
                            onChange={handleChange(setManual)}
                            placeholder="マニュアルのタイトルを入力"
                            className="w-full text-2xl md:text-3xl font-bold text-center mb-8 border-b border-transparent hover:border-slate-300 focus:border-blue-500 outline-none text-slate-800 bg-transparent transition-colors"
                          />
                          <textarea
                            ref={manualTextRef}
                            name="content"
                            value={initializeManual()}
                            onChange={(e) => setManual({...manual, content: e.target.value})}
                            placeholder="ここにマニュアルの本文、提案スクリプト、ターゲットなどを記述します。"
                            className="w-full h-[850px] text-base leading-relaxed text-slate-800 outline-none resize-none bg-transparent"
                          />
                        </div>
                      </div>

                      <div className="flex justify-end mt-6">
                        <button 
                          onClick={() => { showNotification('最後に共創パートナー契約書を作成します', 'success'); setActiveTab('contract'); }}
                          className="bg-amber-600 text-white px-8 py-3 rounded-lg font-bold flex items-center gap-2 hover:bg-amber-700 transition shadow-md"
                        >
                          <Handshake className="w-5 h-5" /> 共創パートナー契約書へ進む
                        </button>
                      </div>
                    </div>
                  )}

                  {activeTab === 'contract' && (
                    <div className="space-y-6 animate-in">
                      <div className="flex justify-between items-end mb-4">
                        <div>
                          <h2 className="text-2xl font-bold mb-2">共創パートナー契約書 (自動生成)</h2>
                        </div>
                        <button 
                          onClick={() => handleCopy(contractTextRef, '契約書をコピーしました！')}
                          className="bg-amber-600 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2 hover:bg-amber-700 transition shadow-md"
                        >
                          <Copy className="w-4 h-4" /> Word用にコピー
                        </button>
                      </div>

                      <div className="bg-slate-200 dark:bg-slate-950 p-4 md:p-8 rounded-xl flex justify-center overflow-x-auto shadow-inner">
                        <div className="bg-white w-full max-w-[210mm] min-h-[297mm] shadow-lg rounded-sm p-8 md:p-12 transition-colors">
                          <input 
                            type="text" 
                            name="title"
                            value={contract.title || '共創パートナー基本契約書'}
                            onChange={handleChange(setContract)}
                            className="w-full text-2xl font-bold text-center mb-8 border-b border-transparent hover:border-slate-300 focus:border-blue-500 outline-none text-slate-800 bg-transparent transition-colors"
                          />
                          <textarea
                            ref={contractTextRef}
                            name="content"
                            value={initializeContract()}
                            onChange={(e) => setContract({...contract, content: e.target.value})}
                            className="w-full h-[800px] text-sm leading-relaxed text-slate-800 outline-none resize-none bg-transparent"
                          />
                        </div>
                      </div>
                    </div>
                  )}

                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // サブコンポーネント群
    // ==========================================
    function SidebarItem({ icon, label, active, onClick, isHighlight }) {
      return (
        <button
          onClick={onClick}
          className={`flex items-center gap-3 w-full p-3 rounded-lg text-sm font-bold transition-colors ${
            active 
              ? (isHighlight ? 'bg-amber-600 text-white shadow-md' : 'bg-blue-600 text-white shadow-md')
              : (isHighlight ? 'text-amber-600 dark:text-amber-400 hover:bg-amber-50 dark:hover:bg-amber-900/20' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700')
          }`}
        >
          {icon}
          {label}
        </button>
      );
    }

    function EditorField({ label, name, value, onChange, placeholder, rows = 1 }) {
      return (
        <div>
          <label className="block text-sm font-bold mb-1 text-slate-700 dark:text-slate-300">{label}</label>
          {rows === 1 ? (
            <input type="text" name={name} value={value} onChange={onChange} placeholder={placeholder} 
              className="w-full p-2 border border-slate-300 dark:border-slate-600 rounded bg-white dark:bg-slate-700 text-slate-800 dark:text-white placeholder-slate-400 focus:ring-2 focus:ring-blue-500 outline-none" />
          ) : (
            <textarea name={name} value={value} onChange={onChange} placeholder={placeholder} rows={rows} 
              className="w-full p-2 border border-slate-300 dark:border-slate-600 rounded bg-white dark:bg-slate-700 text-slate-800 dark:text-white placeholder-slate-400 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
          )}
        </div>
      );
    }

    function CheckItem({ checked, onChange, label }) {
      return (
        <label className="flex items-start gap-3 cursor-pointer group">
          <div className={`mt-0.5 rounded-full flex-shrink-0 transition-colors ${checked ? 'text-blue-600' : 'text-slate-300'}`}><CheckCircle2 className="w-5 h-5" /></div>
          <input type="checkbox" className="hidden" checked={checked} onChange={onChange} />
          <span className={`text-sm ${checked ? 'text-slate-500 line-through' : 'text-slate-700 dark:text-slate-200'}`}>{label}</span>
        </label>
      );
    }

    function NextButton({ onClick }) {
      return (
        <div className="flex justify-end mt-6">
          <button onClick={onClick} className="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold flex items-center gap-2 hover:bg-blue-700 transition shadow-md">
            保存して次へ <ArrowRight className="w-4 h-4" />
          </button>
        </div>
      );
    }

    // ==========================================
    // アプリケーションのレンダリング
    // ==========================================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
